<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circle top-right -->
  <circle cx="1050" cy="100" r="380" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Icon mark (top-left) -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="#0891b2"/>
  <text x="116" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" fill="white" text-anchor="middle">BC</text>

  <!-- BCDevAI wordmark -->
  <text x="172" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#22d3ee" letter-spacing="-0.5">BC</text>
  <text x="236" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#94a3b8">Dev</text>
  <text x="303" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#22d3ee">AI</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">Choose the Right</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#22d3ee" letter-spacing="-1">AI Coding Agent</text>
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">for Business Central</text>

  <!-- Sub-tagline -->
  <text x="80" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Codex · Claude Code · Copilot · ChatGPT · Cursor · Custom Agents</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="578" width="1200" height="52" fill="#0891b2" opacity="0.12"/>
  <text x="80" y="613" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">bcforge-ai.netlify.app</text>

  <!-- Decorative dots grid (top-right) -->
  <g fill="#0891b2" opacity="0.25">
    <circle cx="900" cy="200" r="4"/><circle cx="930" cy="200" r="4"/><circle cx="960" cy="200" r="4"/><circle cx="990" cy="200" r="4"/>
    <circle cx="900" cy="230" r="4"/><circle cx="930" cy="230" r="4"/><circle cx="960" cy="230" r="4"/><circle cx="990" cy="230" r="4"/>
    <circle cx="900" cy="260" r="4"/><circle cx="930" cy="260" r="4"/><circle cx="960" cy="260" r="4"/><circle cx="990" cy="260" r="4"/>
    <circle cx="900" cy="290" r="4"/><circle cx="930" cy="290" r="4"/><circle cx="960" cy="290" r="4"/><circle cx="990" cy="290" r="4"/>
    <circle cx="900" cy="320" r="4"/><circle cx="930" cy="320" r="4"/><circle cx="960" cy="320" r="4"/><circle cx="990" cy="320" r="4"/>
  </g>
</svg>
