<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background: cyan-700 rounded square -->
  <rect width="48" height="48" rx="10" fill="#0891b2"/>
  <!-- Subtle inner border glow -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="8.5" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>

  <!-- Letter B -->
  <!-- Vertical stem -->
  <rect x="7" y="12" width="3" height="24" rx="1" fill="white"/>
  <!-- Upper bump -->
  <path d="M10 12 H17.5 C22.5 12 22.5 24 17.5 24 H10 Z" fill="white"/>
  <!-- Lower bump (slightly larger) -->
  <path d="M10 24 H18.5 C25 24 25 36 18.5 36 H10 Z" fill="white"/>

  <!-- Letter C: 270-degree arc opening right -->
  <path d="M37 18 A7.5 7.5 0 1 0 37 30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- AI dot accents (top-right corner) -->
  <circle cx="43" cy="7" r="1.5" fill="#7dd3fc" opacity="0.8"/>
  <circle cx="43" cy="12" r="1" fill="#7dd3fc" opacity="0.5"/>
</svg>
